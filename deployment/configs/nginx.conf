# Nginx configuration for single-domain integration of website and Schoolars-work-bench
# This configuration seamlessly routes all services through one domain

# Upstream servers
upstream nextjs_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream python_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream scholars_api {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream scholar_forge {
    server 127.0.0.1:4500;
    keepalive 32;
}

upstream go_password_service {
    server 127.0.0.1:9001;
    keepalive 16;
}

upstream go_telemetry_service {
    server 127.0.0.1:9002;
    keepalive 16;
}

upstream go_image_service {
    server 127.0.0.1:9003;
    keepalive 16;
}

upstream go_worker_service {
    server 127.0.0.1:9004;
    keepalive 16;
}

# Main HTTP server block (Local Development - No SSL)
server {
    listen 80;
    listen [::]:80;
    server_name localhost 127.0.0.1;

    # Security headers (without HSTS for HTTP)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/combined-access.log;
    error_log /var/log/nginx/combined-error.log;

    # Client body size limit (for file uploads)
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Scholar Forge static assets and SPA
    location /scholars {
        alias /home/codecrafter/Documents/combined/Schoolars-work-bench/artifacts/scholar-forge/dist;
        try_files $uri $uri/ /scholars/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Scholar Forge API requests (proxy to Vite dev server in dev, or static in prod)
    location /scholars/ {
        proxy_pass http://scholar_forge/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin API (Python backend)
    location /api/ {
        proxy_pass http://python_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Handle multipart form data for file uploads
        proxy_set_header Content-Type $content_type;
        proxy_request_buffering off;
    }

    # Scholars API (Flask backend) - direct access
    location /scholars-api/ {
        proxy_pass http://scholars_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Go microservices (internal use, can be restricted)
    location /go-services/password/ {
        proxy_pass http://go_password_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Restrict access to localhost/internal networks if needed
        # allow 127.0.0.1;
        # deny all;
    }

    location /go-services/telemetry/ {
        proxy_pass http://go_telemetry_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /go-services/image/ {
        proxy_pass http://go_image_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /go-services/worker/ {
        proxy_pass http://go_worker_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Media uploads (static files from Python backend)
    location /uploads/ {
        alias /home/codecrafter/Documents/combined/website/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Security: prevent execution of uploaded files
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://nextjs_frontend/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js public assets
    location /static/ {
        proxy_pass http://nextjs_frontend/static/;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public";
    }

    # Main Next.js application (catch-all)
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Next.js specific headers
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
